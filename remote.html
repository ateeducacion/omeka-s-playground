<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Omeka S Playground Runtime Host</title>
    <link rel="stylesheet" href="./src/styles/app.css">
  </head>
  <body data-app="remote">
    <div class="remote-boot">
      <iframe id="remote-frame" title="Omeka Site Host"></iframe>
      <div class="remote-boot__card">
        <strong>Configuring Omeka-S Playground</strong>
        <p id="remote-status">Loading playground runtime.</p>
        <div class="remote-boot__progress">
          <progress id="remote-progress" max="1" value="0.04"></progress>
          <span id="remote-progress-label">Loading...</span>
        </div>
      </div>
    </div>
    <script type="module" src="./src/remote/main.js"></script>
  </body>
</html>
