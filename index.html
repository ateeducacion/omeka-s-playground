<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Omeka S Playground</title>
    <link rel="stylesheet" href="./src/styles/app.css">
  </head>
  <body data-app="shell">
    <div class="shell">
      <header class="browser-toolbar" aria-label="Playground toolbar">
        <div class="browser-toolbar__address">
          <form id="address-form" class="address-form">
            <div class="toolbar-brand" aria-label="Omeka S Playground">
              <img src="./assets/branding/logo.png" alt="Omeka S" class="toolbar-brand__logo">
            </div>
            <button type="button" id="refresh-button" class="icon-button" aria-label="Refresh page" title="Refresh page">
              <span aria-hidden="true">↻</span>
            </button>
            <div class="address-form__input">
              <input id="address-input" type="text" spellcheck="false" value="/" aria-label="URL inside the Omeka site">
            </div>
            <input type="submit" tabindex="-1" hidden>
          </form>
        </div>
        <div class="browser-toolbar__actions">
          <button type="button" id="home-button" class="toolbar-link">Home</button>
          <button type="button" id="admin-button" class="toolbar-link">Admin</button>
          <button type="button" id="panel-toggle-button" class="icon-button" aria-label="Open settings panel" aria-expanded="false" title="Open settings panel">
            <span aria-hidden="true">☰</span>
          </button>
        </div>
      </header>

      <div id="workspace" class="workspace is-panel-collapsed">
        <section class="viewport">
          <iframe id="site-frame" title="Omeka S Playground" loading="eager"></iframe>
        </section>

        <aside id="side-panel" class="side-panel is-collapsed" aria-label="Playground panel">
          <div class="side-panel__header">
            <div>
              <strong>Omeka Playground</strong>
              <span>Browser runtime controls</span>
            </div>
          </div>

          <div class="panel-tabs" role="tablist" aria-label="Playground panel tabs">
            <button type="button" id="settings-tab" class="panel-tab is-active" role="tab" aria-selected="true" data-panel-tab="settings">Settings</button>
            <button type="button" id="logs-tab" class="panel-tab" role="tab" aria-selected="false" data-panel-tab="logs">Logs</button>
          </div>

          <section id="settings-panel" class="side-panel__content" role="tabpanel" aria-labelledby="settings-tab" data-panel-view="settings">
            <div class="settings-card">
              <div class="status-card">
                <strong id="status-title">Booting runtime</strong>
                <span id="status-detail">Preparing static shell.</span>
              </div>
              <div class="progress-card">
                <div class="panel__row">
                  <span>Bootstrap progress</span>
                  <span id="progress-label">0%</span>
                </div>
                <progress id="progress-bar" max="1" value="0"></progress>
              </div>
            </div>

            <label class="settings-field">
              <span>PHP runtime</span>
              <select id="runtime-select"></select>
            </label>

            <div class="settings-actions">
              <button type="button" id="reset-button" class="danger">Reset</button>
              <button type="button" id="export-button">Export</button>
              <label class="import-button" for="import-input">Import</label>
              <input id="import-input" type="file" accept="application/json" hidden>
            </div>
          </section>

          <section id="logs-panel" class="side-panel__content is-hidden" role="tabpanel" aria-labelledby="logs-tab" data-panel-view="logs">
            <div class="panel__row">
              <span>Runtime log</span>
              <button type="button" id="clear-logs-button">Clear</button>
            </div>
            <pre id="log-panel" class="log-panel"></pre>
          </section>
        </aside>
      </div>
    </div>

    <script type="module" src="./src/shell/main.js"></script>
  </body>
</html>
