name: Biome Debug

on:
  push:
    branches: ["security/harden-dev-proxy-ssrf"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run Biome on changed files
        run: |
          npm install --silent
          npx @biomejs/biome check scripts/dev-server.mjs tests/dev-server.test.mjs
