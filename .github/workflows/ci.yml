name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Least-privilege GITHUB_TOKEN: the test/lint/e2e jobs only read the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          node --check src/shared/blueprint.js
          node --check src/runtime/bootstrap.js
          node --check lib/streaming-tar-extract.js
          node --check scripts/lib/tar-ustar.mjs

      - name: Run tests
        run: make test

      - name: Lint
        run: make lint

  # E2E boot smoke: builds the default Omeka bundle and asserts the runtime
  # boots (so a core-extraction regression that makes boot fail/too-slow is
  # caught — parity with the sibling playgrounds). The Playwright webServer
  # runs `make bundle` (git clone + composer + runtime) then `make serve`;
  # ubuntu-latest ships php + composer.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          # Node 24 LTS: the e2e job builds the tar.zst bundle (make bundle),
          # which needs native node:zlib zstd support (Node >= 22.15).
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: test-results/
          retention-days: 7
